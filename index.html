<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Masiha Favaran</title>

<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:radial-gradient(circle,#1a0033,#000 60%,#000);
}

/* glow background */
body::before, body::after{
  content:"";
  position:fixed;
  width:500px;
  height:500px;
  filter:blur(120px);
  z-index:-1;
}
body::before{
  background:rgba(0,255,255,0.08);
  top:-100px; left:-100px;
}
body::after{
  background:rgba(255,0,100,0.08);
  bottom:-100px; right:-100px;
}

/* BIO BOX */
.box{
  width:90%;
  max-width:520px;
  margin:80px auto 30px;
  padding:25px;
  border-radius:20px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
}

h1{margin-bottom:10px}

/* SLIDER */
.slider-wrapper{
  position:relative;
  width:92%;
  max-width:650px;
  margin:30px auto 60px;
  overflow:hidden;
  border-radius:16px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.1);
}

/* track */
.slider-track{
  display:flex;
  transition:transform 0.4s ease;
}

/* card link */
.track{
  min-width:140px;
  margin:15px;
  text-decoration:none;
  color:white;
}

.track img{
  width:110px;
  height:110px;
  border-radius:14px;
  object-fit:cover;
}

.track span{
  display:block;
  margin-top:6px;
  font-size:12px;
}

/* buttons */
.btn{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:rgba(0,0,0,0.6);
  border:none;
  color:white;
  font-size:22px;
  padding:8px 12px;
  cursor:pointer;
}

#prev{left:0}
#next{right:0}

</style>
</head>

<body>

<!-- BIO -->
<div class="box">
  <h1>مسیحا فوران</h1>
  <p>
    هنرمند مستقل سبک Hip-Hop / Rap / R&B<br>
    تنظیم، میکس و مسترینگ شخصی<br>
    فضای دارک و احساسی
  </p>
</div>

<!-- SLIDER -->
<div class="slider-wrapper">

  <button class="btn" id="prev">‹</button>

  <div class="slider-track" id="track">

    <a class="track" href="track1.html">
      <img src="CoverMusic.png">
      <span>Rafti Ke Nabashi</span>
    </a>

    <a class="track" href="track2.html">
      <img src="CoverInfidelCoward.jpg">
      <span>Infidel Coward</span>
    </a>

  </div>

  <button class="btn" id="next">›</button>

</div>

<script>
let index = 0;
const track = document.getElementById("track");
const items = document.querySelectorAll(".track");

function update(){
  const width = items[0].offsetWidth + 30;
  track.style.transform = `translateX(-${index * width}px)`;
}

document.getElementById("next").onclick = () => {
  if(index < items.length - 1){
    index++;
    update();
  }
}

document.getElementById("prev").onclick = () => {
  if(index > 0){
    index--;
    update();
  }
}
</script>

</body>
</html>
