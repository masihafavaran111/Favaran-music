<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rafti Ke Nabashi</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      background: linear-gradient(-45deg, #0f0f0f, #1a0033, #000000, #001a33);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .box {
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 25px rgba(0,0,0,0.6), 0 0 20px rgba(0, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      width: 90%;
      max-width: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 24px;
      margin-bottom: 15px;
      text-shadow: 0 0 10px rgba(0,255,255,0.3);
    }

    audio {
      width: 100%;
      margin-top: 10px;
    }

    .download-box {
      margin-top: 20px;
    }

    .download-btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 18px;
      border-radius: 10px;
      background: #00ffff;
      color: black;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 0 15px #00ffff;
      transition: 0.3s;
    }

    .download-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #00ffff;
    }
  </style>
</head>

<body>

  <div class="box">

    <h1>Rafti Ke Nabashi</h1>

    <audio controls>
      <source src="RaftiKeNabashi.mp3" type="audio/mpeg">
    </audio>

    <div class="download-box">
      <a class="download-btn" href="RaftiKeNabashi.mp3" download>
        ⬇ Download با کیفیت عالی
      </a>
    </div>

  </div>

</body>
</html>
